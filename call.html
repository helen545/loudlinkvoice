<!DOCTYPE html>
<html>
<head>
  <title>Incoming Call</title>
  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .box {
      background: white;
      color: black;
      padding: 30px;
      border-radius: 10px;
      text-align: center;
    }
    button {
      padding: 10px 20px;
      margin: 10px;
      border: none;
      color: white;
    }
    .answer {
      background: green;
    }
    .decline {
      background: red;
    }
  </style>
</head>

<body>

<div class="box">
  <h2>📞 Incoming Call</h2>
  <p>Caller: +1 XXX XXX XXXX</p>

  <button class="answer">Answer</button>
  <button class="decline">Decline</button>
</div>

</body>
</html>
