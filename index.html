<!DOCTYPE html>
<html>
<head>

    body {

      background: #0f172a;

      display: flex;

      height: 100vh;

    .box {
      background: white;
      color: black;
      padding: 30px;

    input {
      width: 100%;

      padding: 10px;

      color: white;
      border: none;
    }
  </style>
</head>

<body>

<div class="box">
  <h2>LoudLinkVoice</h2>
  <p>Business Phone Login</p>

  <input type="text" placeholder="Email">

  <button onclick="window.location.href='dashboard.html'">Login</button>
</div>

</body>
</html>
